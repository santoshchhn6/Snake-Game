apiVersion: v1
kind: Service
metadata:
  name: snake-game-svc
  namespace: game-ns
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: snake-game
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
