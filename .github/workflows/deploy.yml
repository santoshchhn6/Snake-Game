name: CI/CD - Snake Game to EKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: snake-game-cluster
  K8S_NAMESPACE: game-ns
  DOCKER_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/snake-game

jobs:
  build:
    runs-on: ubuntu-latest
    # Explicitly use Node 22 runner (GitHub defaults to it now, but explicit is safer)
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          IMAGE_TAG="${{ github.sha }}"
          kubectl set image deployment/snake-game -n ${{ env.K8S_NAMESPACE }} \
            snake-game=${{ env.DOCKER_IMAGE }}:${IMAGE_TAG}
          
          kubectl rollout status deployment/snake-game -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          
          echo "✅ Deployment successful!"
          echo "🔗 Image: ${{ env.DOOKER_IMAGE }}:${IMAGE_TAG}"

