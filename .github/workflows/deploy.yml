  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      KUBECONFIG: /tmp/kubeconfig
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --kubeconfig $KUBECONFIG \
            --alias eks
          cat $KUBECONFIG # Debug: verify kubeconfig was written

      - name: Deploy to EKS
        run: |
          kubectl --kubeconfig $KUBECONFIG set image deployment/snake-game \
            -n ${{ env.K8S_NAMESPACE }} \
            snake-game=${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          
          kubectl --kubeconfig $KUBECONFIG rollout status deployment/snake-game \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          
          echo "✅ Deployment successful!"
          echo "🔗 Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

