name: Deploy Snake Game to EKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for AWS OIDC

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: snake-game-cluster
  K8S_NAMESPACE: game-ns
  DOCKER_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/snake-game

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Update kubeconfig & Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          
          kubectl set image deployment/snake-game -n ${{ env.K8S_NAMESPACE }} \
            snake-game=${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          
          kubectl rollout status deployment/snake-game -n ${{ env.K8S_NAMESPACE }} --timeout=5m
          
          echo "✅ Deployment complete! Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

